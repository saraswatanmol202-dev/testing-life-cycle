<!-- Epic Title: Define User Roles -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Role Management</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/role_management.css') }}">
</head>
<body>
    <header>
        <h1>Manage Roles</h1>
    </header>
    <main>
        <section>
            <h2>Define New Role</h2>
            <form method="POST">
                <label for="name">Role Name:</label>
                <input type="text" id="name" name="name" required><br>
                <label for="description">Description:</label>
                <textarea id="description" name="description" required></textarea><br>
                <button type="submit">Save</button>
            </form>
        </section>
        <section>
            <h2>Available Roles</h2>
            <ul id="roles-list">
                {% for role in roles %}
                <li>
                    <p>{{ role.name }} - {{ role.description }}</p>
                </li>
                {% endfor %}
            </ul>
        </section>
        <section>
            <h2>Assign Role to User</h2>
            <form id="assign-role-form">
                <label for="user-id">User ID:</label>
                <input type="number" id="user-id" name="user_id" required><br>
                <label for="role-id">Role ID:</label>
                <select id="role-id" name="role_id">
                    {% for role in roles %}
                    <option value="{{ role.role_id }}">{{ role.name }}</option>
                    {% endfor %}
                </select><br>
                <button type="submit">Assign</button>
            </form>
            <pre id="assign-result"></pre>
        </section>
    </main>
    <footer>
        <p>&copy; 2023 Role Management</p>
    </footer>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $('#assign-role-form').on('submit', function(e) {
            e.preventDefault();
            let user_id = $('#user-id').val();
            let role_id = $('#role-id').val();
            $.post("{{ url_for('role_management.assign_role') }}", {user_id: user_id, role_id: role_id}, function(data) {
                $('#assign-result').text(JSON.stringify(data, null, 2));
            }).fail(function(error) {
                $('#assign-result').text('Error: ' + error.responseText);
            });
        });
    </script>
</body>
</html>
