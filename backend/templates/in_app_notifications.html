<!-- Epic Title: In-app Notifications -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>In-app Notifications</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/in_app_notifications.css') }}">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <header>
        <h1>In-app Notifications</h1>
    </header>
    <main>
        <section>
            <ul id="in-app-notification-list">
                {% for notification in notifications %}
                <li>
                    <p>{{ notification.message }}</p>
                    <small>{{ notification.created_at }}</small>
                </li>
                {% endfor %}
            </ul>
        </section>
    </main>
    <footer>
        <p>&copy; 2023 In-app Notifications</p>
    </footer>
    <script>
        function fetchNotifications() {
            $.getJSON("{{ url_for('in_app_notifications.api_in_app_notifications') }}", function(data) {
                $('#in-app-notification-list').empty();
                data.forEach(function(notification) {
                    $('#in-app-notification-list').append('<li><p>' + notification.message + '</p><small>' + notification.created_at + '</small></li>');
                });
            });
        }

        $(document).ready(function() {
            setInterval(fetchNotifications, 5000); // Fetch new notifications every 5 seconds
        });
    </script>
</body>
</html>
